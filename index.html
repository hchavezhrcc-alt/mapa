<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Incidentes — Centroamérica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
:root{--bg:#0a0c10;--panel:#10141a;--panel2:#161b24;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;--accent:#00e5a0;--red:#ff4757;--green:#2ed573;--amber:#ffa502;--blue:#1e90ff;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#app{display:flex;height:100vh;}
#sidebar{width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;}
#map-container{flex:1;position:relative;}
#header{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
#header h1{font-size:16px;font-weight:700;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
#header h1::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#header p{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
#stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.stat{padding:12px 14px;text-align:center;}
.stat:not(:last-child){border-right:1px solid var(--border);}
.stat-num{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.stat-num.total{color:var(--accent);}
.stat-num.grave{color:var(--red);}
.stat-num.leve{color:var(--green);}
#filters{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
#filters::-webkit-scrollbar{width:4px;}
#filters::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.filter-group label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;outline:none;font-family:var(--font);font-size:12px;transition:border-color .2s;}
select:hover,select:focus{border-color:var(--accent);}
option{background:var(--panel2);}
.layer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.layer-btn{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:var(--font);color:var(--text);font-size:12px;font-weight:500;}
.layer-btn:hover{border-color:rgba(255,255,255,0.2);}
.layer-btn.on-grave{border-color:var(--red);background:rgba(255,71,87,0.1);}
.layer-btn.on-leve{border-color:var(--green);background:rgba(46,213,115,0.1);}
.layer-btn.on-heat{border-color:var(--amber);background:rgba(255,165,2,0.1);}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px;}
#reset-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:8px;cursor:pointer;font-family:var(--font);font-size:12px;transition:all .2s;width:100%;}
#reset-btn:hover{border-color:var(--accent);color:var(--accent);}
#map-header{position:absolute;top:16px;left:16px;z-index:500;background:rgba(10,12,16,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:10px 16px;}
#map-header span{font-size:12px;color:var(--muted);font-family:var(--mono);}
#map-header strong{color:var(--accent);}
#country-legend{position:absolute;bottom:30px;right:16px;z-index:500;background:rgba(10,12,16,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:12px 14px;max-height:240px;overflow-y:auto;}
#country-legend .cl-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.c-badge{font-size:11px;font-family:var(--mono);color:var(--text);padding:3px 0;display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.c-badge:last-child{border-bottom:none;margin-bottom:0;}
.c-count{color:var(--accent);font-weight:500;}
.inc-popup{font-family:var(--font);min-width:220px;}
.inc-popup .pop-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pop-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
.pop-badge.grave{background:rgba(255,71,87,0.2);color:#ff6b7a;border:1px solid rgba(255,71,87,0.4);}
.pop-badge.leve{background:rgba(46,213,115,0.15);color:#5dfc9e;border:1px solid rgba(46,213,115,0.3);}
.pop-title{font-size:13px;font-weight:600;}
.pop-row{font-size:11px;padding:3px 0;display:flex;gap:6px;}
.pop-row span:first-child{color:#6b7280;min-width:64px;}
.pop-row span:last-child{color:#d1d5db;}
.leaflet-popup-content-wrapper{background:#0f1318!important;border:1px solid rgba(255,255,255,0.1)!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;color:var(--text)!important;}
.leaflet-popup-tip{background:#0f1318!important;}
.leaflet-popup-close-button{color:#6b7280!important;font-size:16px!important;}
.leaflet-control-zoom a{background:#10141a!important;color:var(--text)!important;border-color:var(--border)!important;}
.leaflet-control-attribution{background:rgba(10,12,16,0.8)!important;color:#4b5563!important;font-size:9px!important;}
.custom-cluster{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;border:2px solid;cursor:pointer;transition:transform .15s;}
.custom-cluster:hover{transform:scale(1.1);}
.cluster-grave{background:rgba(255,71,87,0.25);border-color:#ff4757;color:#ff4757;}
.cluster-leve{background:rgba(46,213,115,0.2);border-color:#2ed573;color:#2ed573;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
#loading h2{color:var(--accent);font-size:18px;margin-bottom:12px;}
#loading p{color:var(--muted);font-size:13px;font-family:var(--mono);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><h2>INCIDENT RADAR</h2><p>Cargando 1,458 incidentes...</p></div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div id="header">
      <h1>INCIDENT RADAR</h1>
      <p>Centroamérica · 2020–2025</p>
    </div>
    <div id="stats">
      <div class="stat"><div class="stat-num total" id="s-total">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num grave" id="s-grave">—</div><div class="stat-lbl">Graves</div></div>
      <div class="stat"><div class="stat-num leve"  id="s-leve">—</div><div class="stat-lbl">Leves</div></div>
    </div>
    <div id="filters">
      <div class="filter-group">
        <label>Capas del mapa</label>
        <div class="layer-grid">
          <button class="layer-btn on-grave" id="btn-grave" onclick="toggleLayer('grave')"><span class="dot" style="background:var(--red);box-shadow:0 0 6px var(--red)"></span>Graves</button>
          <button class="layer-btn on-leve"  id="btn-leve"  onclick="toggleLayer('leve')"><span class="dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>Leves</button>
          <button class="layer-btn"          id="btn-heat"  onclick="toggleLayer('heat')"><span class="dot" style="background:var(--amber)"></span>Calor</button>
        </div>
      </div>
      <div class="filter-group">
        <label>País</label>
        <select id="f-pais" onchange="applyFilters()">
          <option value="">Todos los países</option>
          <option>Belize</option><option>Costa Rica</option><option>El Salvador</option>
          <option>Guatemala</option><option>Honduras</option><option>Nicaragua</option><option>Panama</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Año</label>
        <select id="f-year" onchange="applyFilters()">
          <option value="">Todos los años</option>
          <option>2020</option><option>2021</option><option>2022</option>
          <option>2023</option><option>2024</option><option>2025</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tipo de incidente</label>
        <select id="f-tipo" onchange="applyFilters()"><option value="">Todos los tipos</option></select>
      </div>
      <div class="filter-group">
        <label>Gravedad</label>
        <select id="f-grav" onchange="applyFilters()">
          <option value="">Todas</option>
          <option value="1">Solo Graves</option>
          <option value="0">Solo Leves</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Leyenda</label>
        <div class="legend-row"><div class="dot" style="background:var(--red);box-shadow:0 0 5px var(--red)"></div>Grave (High / Crime / Injury)</div>
        <div class="legend-row"><div class="dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>Leve</div>
        <div class="legend-row"><div class="dot" style="background:var(--amber)"></div>Calor (densidad)</div>
        <div class="legend-row"><div class="dot" style="background:var(--red);opacity:.5"></div>Cluster rojo = múltiples graves</div>
        <div class="legend-row"><div class="dot" style="background:var(--green);opacity:.5"></div>Cluster verde = múltiples leves</div>
      </div>
      <button id="reset-btn" onclick="resetFilters()">↺ Restablecer filtros</button>
    </div>
  </div>
  <div id="map-container">
    <div id="map-header"><span>Mostrando <strong id="visible-count">—</strong> incidentes</span></div>
    <div id="country-legend"><div class="cl-title">Por país</div><div id="country-counts"></div></div>
    <div id="map" style="width:100%;height:100%;"></div>
  </div>
</div>

(function init(){
  var layerState={grave:true,leve:true,heat:false};
  var currentData=INCIDENTS;

  var map=L.map('map',{center:[12.5,-85.5],zoom:6});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);

  var heatLayer=null;
  var activeGroups=[];

  function makeIcon(color){
    return L.divIcon({
      html:'<div style="width:11px;height:11px;border-radius:50%;background:'+color+';box-shadow:0 0 7px '+color+';border:1.5px solid rgba(255,255,255,0.3)"></div>',
      className:'',iconSize:[11,11],iconAnchor:[5,5],popupAnchor:[0,-8]
    });
  }
  var ICON_GRAVE=makeIcon('#ff4757');
  var ICON_LEVE=makeIcon('#2ed573');

  function popupHTML(d){
    var cls=d.g?'grave':'leve',lbl=d.g?'GRAVE':'LEVE';

      '<div class="pop-row"><span>Prioridad</span><span>'+(d.pri||'—')+'</span></div>'+
      '<div class="pop-row"><span>Misión</span><span>'+(d.mision||'—')+'</span></div>'+
      '<div class="pop-row"><span>Status</span><span>'+(d.status||'—')+'</span></div>'+

      '</div>';
  }

  var tipos=[];
  INCIDENTS.forEach(function(d){
    if(d.tipo&&d.tipo!=='nan'&&d.tipo!=='None'&&tipos.indexOf(d.tipo)===-1)tipos.push(d.tipo);
  });
  tipos.sort();
  var fTipo=document.getElementById('f-tipo');
  tipos.forEach(function(t){var o=document.createElement('option');o.value=o.textContent=t;fTipo.appendChild(o);});

  function makeClusterGroup(colorClass){
    return L.markerClusterGroup({
      maxClusterRadius:50,
      iconCreateFunction:function(cluster){
        var count=cluster.getChildCount();
        var size=count<10?32:count<50?40:48;
        return L.divIcon({

    });

  function render(data){

    data.forEach(function(d){
      if(!d.lat||!d.lon)return;
      cc[d.pais]=(cc[d.pais]||0)+1;
      heatPts.push([d.lat,d.lon,d.g?1:0.35]);
      var m=L.marker([d.lat,d.lon],{icon:d.g?ICON_GRAVE:ICON_LEVE});
      m.bindPopup(popupHTML(d),{maxWidth:280});
      if(d.g){graveCluster.addLayer(m);gCount++;}
      else{leveCluster.addLayer(m);lCount++;}
    });

    if(layerState.grave){graveCluster.addTo(map);activeGroups.push(graveCluster);}
    if(layerState.leve){leveCluster.addTo(map);activeGroups.push(leveCluster);}

    if(layerState.heat&&heatPts.length){
      heatLayer=L.heatLayer(heatPts,{
        radius:28,blur:20,maxZoom:10,
        gradient:{0.1:'#1a472a',0.4:'#ffa502',0.7:'#ff6b35',1:'#ff4757'}
      }).addTo(map);
    }

    document.getElementById('s-total').textContent=data.length.toLocaleString();
    document.getElementById('s-grave').textContent=gCount.toLocaleString();
    document.getElementById('s-leve').textContent=lCount.toLocaleString();
    document.getElementById('visible-count').textContent=data.length.toLocaleString();

    var entries=Object.keys(cc).map(function(k){return[k,cc[k]];}).sort(function(a,b){return b[1]-a[1];});
    document.getElementById('country-counts').innerHTML=entries.map(function(e){
      return '<div class="c-badge"><span>'+e[0]+'</span><span class="c-count">'+e[1]+'</span></div>';
    }).join('');
  }

  function applyFilters(){
    var pais=document.getElementById('f-pais').value;
    var year=document.getElementById('f-year').value;
    var tipo=document.getElementById('f-tipo').value;
    var grav=document.getElementById('f-grav').value;
    currentData=INCIDENTS.filter(function(d){
      if(pais&&d.pais!==pais)return false;
      if(year&&d.year!==parseInt(year))return false;
      if(tipo&&d.tipo!==tipo)return false;
      if(grav!==''&&d.g!==parseInt(grav))return false;
      return true;
    });
    render(currentData);
  }

  function resetFilters(){
    ['f-pais','f-year','f-tipo','f-grav'].forEach(function(id){document.getElementById(id).value='';});
    currentData=INCIDENTS;render(currentData);
  }

  var btnCls={grave:'on-grave',leve:'on-leve',heat:'on-heat'};
  function toggleLayer(layer){
    layerState[layer]=!layerState[layer];
    var btn=document.getElementById('btn-'+layer);
    if(layerState[layer])btn.classList.add(btnCls[layer]);
    else btn.classList.remove(btnCls[layer]);
    render(currentData);
  }

  window.toggleLayer=toggleLayer;
  window.applyFilters=applyFilters;
  window.resetFilters=resetFilters;

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render(INCIDENTS);
})();
</script>
</body>
</html>
